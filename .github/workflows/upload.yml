name: DeviantArt Auto Upload

on:
  schedule:
    # 毎日 JST 12:00 (UTC 3:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests gdown pytrends

      - name: Download uploaded log
        continue-on-error: true
        run: |
          gh run download --name uploaded-log --dir . 2>/dev/null || echo "No previous log found"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run upload (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          DA_CLIENT_ID: ${{ secrets.DA_CLIENT_ID }}
          DA_CLIENT_SECRET: ${{ secrets.DA_CLIENT_SECRET }}
          DA_ACCESS_TOKEN: ${{ secrets.DA_ACCESS_TOKEN }}
          DA_REFRESH_TOKEN: ${{ secrets.DA_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Save tokens and log (attempt 1)
        if: always() && steps.attempt1.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: uploaded-log
          path: uploaded.json
          overwrite: true

      - name: Update secrets with refreshed tokens (attempt 1)
        if: always() && steps.attempt1.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not set, skipping secret update"
            exit 0
          fi
          if [ ! -f uploaded.json ]; then
            echo "No uploaded.json found"
            exit 0
          fi
          NEW_AT=$(python3 -c "import json; d=json.load(open('uploaded.json')); print(d.get('tokens',{}).get('access_token',''))" 2>/dev/null || echo "")
          NEW_RT=$(python3 -c "import json; d=json.load(open('uploaded.json')); print(d.get('tokens',{}).get('refresh_token',''))" 2>/dev/null || echo "")
          if [ -n "$NEW_AT" ]; then
            echo "$NEW_AT" | gh secret set DA_ACCESS_TOKEN
            echo "DA_ACCESS_TOKEN updated"
          fi
          if [ -n "$NEW_RT" ]; then
            echo "$NEW_RT" | gh secret set DA_REFRESH_TOKEN
            echo "DA_REFRESH_TOKEN updated"
          fi

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure'
        run: echo "Attempt 1 failed. Waiting 60s..." && sleep 60

      - name: Run upload (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          DA_CLIENT_ID: ${{ secrets.DA_CLIENT_ID }}
          DA_CLIENT_SECRET: ${{ secrets.DA_CLIENT_SECRET }}
          DA_ACCESS_TOKEN: ${{ secrets.DA_ACCESS_TOKEN }}
          DA_REFRESH_TOKEN: ${{ secrets.DA_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Save tokens and log (attempt 2)
        if: always() && steps.attempt2.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: uploaded-log
          path: uploaded.json
          overwrite: true

      - name: Update secrets with refreshed tokens (attempt 2)
        if: always() && steps.attempt2.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not set, skipping secret update"
            exit 0
          fi
          if [ ! -f uploaded.json ]; then
            echo "No uploaded.json found"
            exit 0
          fi
          NEW_AT=$(python3 -c "import json; d=json.load(open('uploaded.json')); print(d.get('tokens',{}).get('access_token',''))" 2>/dev/null || echo "")
          NEW_RT=$(python3 -c "import json; d=json.load(open('uploaded.json')); print(d.get('tokens',{}).get('refresh_token',''))" 2>/dev/null || echo "")
          if [ -n "$NEW_AT" ]; then
            echo "$NEW_AT" | gh secret set DA_ACCESS_TOKEN
            echo "DA_ACCESS_TOKEN updated"
          fi
          if [ -n "$NEW_RT" ]; then
            echo "$NEW_RT" | gh secret set DA_REFRESH_TOKEN
            echo "DA_REFRESH_TOKEN updated"
          fi

      - name: Wait before retry 3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: echo "Attempt 2 failed. Waiting 120s..." && sleep 120

      - name: Run upload (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          DA_CLIENT_ID: ${{ secrets.DA_CLIENT_ID }}
          DA_CLIENT_SECRET: ${{ secrets.DA_CLIENT_SECRET }}
          DA_ACCESS_TOKEN: ${{ secrets.DA_ACCESS_TOKEN }}
          DA_REFRESH_TOKEN: ${{ secrets.DA_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Save tokens and log (attempt 3)
        if: always() && steps.attempt3.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: uploaded-log
          path: uploaded.json
          overwrite: true

      - name: Update secrets with refreshed tokens (attempt 3)
        if: always() && steps.attempt3.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not set, skipping secret update"
            exit 0
          fi
          if [ ! -f uploaded.json ]; then
            echo "No uploaded.json found"
            exit 0
          fi
          NEW_AT=$(python3 -c "import json; d=json.load(open('uploaded.json')); print(d.get('tokens',{}).get('access_token',''))" 2>/dev/null || echo "")
          NEW_RT=$(python3 -c "import json; d=json.load(open('uploaded.json')); print(d.get('tokens',{}).get('refresh_token',''))" 2>/dev/null || echo "")
          if [ -n "$NEW_AT" ]; then
            echo "$NEW_AT" | gh secret set DA_ACCESS_TOKEN
            echo "DA_ACCESS_TOKEN updated"
          fi
          if [ -n "$NEW_RT" ]; then
            echo "$NEW_RT" | gh secret set DA_REFRESH_TOKEN
            echo "DA_REFRESH_TOKEN updated"
          fi

      - name: LINE notify on failure
        if: steps.attempt1.outcome == 'failure' && (steps.attempt2.outcome == 'failure' || steps.attempt2.outcome == 'skipped') && (steps.attempt3.outcome == 'failure' || steps.attempt3.outcome == 'skipped')
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"⚠️ DeviantArt自動投稿が3回リトライしても失敗しました\\n\\n時刻: $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M\ JST)\\nログ: https://github.com/MuscleLove-777/deviantart-auto-uploader/actions/runs/${{ github.run_id }}\"
              }]
            }"

      - name: LINE notify on success
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          RETRY_INFO=""
          if [ "${{ steps.attempt2.outcome }}" = "success" ]; then RETRY_INFO="（2回目で成功）"; fi
          if [ "${{ steps.attempt3.outcome }}" = "success" ]; then RETRY_INFO="（3回目で成功）"; fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"✅ DeviantArt自動投稿 成功${RETRY_INFO}\\n時刻: $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M\ JST)\"
              }]
            }"